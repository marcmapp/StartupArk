name: Deploy Frontend to S3 and CloudFront

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.19.0'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build frontend
      run: npm run build

    - name: Verify build structure
      run: |
        echo "=== Build Structure ==="
        find ./dist -type f | head -20
        echo ""
        echo "=== Checking for index.html ==="
        if [ -f "./dist/index.html" ]; then
          echo "index.html found"
          # Check asset paths in index.html
          grep -E "(assets|favicon)" ./dist/index.html || echo "No asset paths found in index.html"
        else
          echo "index.html not found in dist root!"
          find ./dist -name "*.html" | head -5
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy to S3 root (not dist folder)
      run: |
        # Deploy all files to S3 root, not dist folder
        echo "Syncing build files to S3 root..."
        aws s3 sync ./dist/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
          --delete \
          --cache-control "max-age=31536000,public" \
          --exclude "*.html" \
          --size-only
        
        # Upload HTML files separately with different cache control
        echo "Uploading HTML files..."
        aws s3 sync ./dist/ s3://${{ secrets.AWS_S3_BUCKET }}/ \
          --exclude "*" \
          --include "*.html" \
          --cache-control "max-age=0,no-cache,no-store,must-revalidate" \
          --content-type "text/html; charset=utf-8"
        
        # Set correct MIME types for common files
        echo "Setting correct MIME types..."
        
        # JavaScript files
        for js_file in $(find ./dist -name "*.js" -type f); do
          s3_key="${js_file#./dist/}"
          aws s3 cp "$js_file" "s3://${{ secrets.AWS_S3_BUCKET }}/$s3_key" \
            --metadata-directive REPLACE \
            --content-type "application/javascript" \
            --cache-control "max-age=31536000,public" \
            --quiet
        done
        
        # CSS files
        for css_file in $(find ./dist -name "*.css" -type f); do
          s3_key="${css_file#./dist/}"
          aws s3 cp "$css_file" "s3://${{ secrets.AWS_S3_BUCKET }}/$s3_key" \
            --metadata-directive REPLACE \
            --content-type "text/css" \
            --cache-control "max-age=31536000,public" \
            --quiet
        done
        
        # ICO files (favicon)
        for ico_file in $(find ./dist -name "*.ico" -type f); do
          s3_key="${ico_file#./dist/}"
          aws s3 cp "$ico_file" "s3://${{ secrets.AWS_S3_BUCKET }}/$s3_key" \
            --metadata-directive REPLACE \
            --content-type "image/x-icon" \
            --cache-control "max-age=31536000,public" \
            --quiet
        done
        
        echo "S3 deployment complete!"

    - name: Invalidate CloudFront cache
      run: |
        echo "Creating CloudFront invalidation..."
        aws cloudfront create-invalidation \
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
          --paths "/*"
      env:
        AWS_MAX_ATTEMPTS: 10
        AWS_RETRY_MODE: adaptive